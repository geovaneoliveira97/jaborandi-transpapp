<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jaborandi Transporte</title>

    <!-- SEO e compartilhamento -->
    <meta name="description" content="Consulte os horários oficiais de ônibus intermunicipais de Jaborandi–SP. Linhas da empresa Rápido do Oeste." />
    <meta name="theme-color" content="#2ab76a" />
    <meta property="og:title" content="Jaborandi Transporte" />
    <meta property="og:description" content="Horários de ônibus de Jaborandi–SP de forma simples e rápida." />
    <meta property="og:type" content="website" />

    <!-- PWA -->
    <link rel="icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="JaborandiTransp" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://www.googletagmanager.com;
      connect-src 'self' https://*.supabase.co https://www.google-analytics.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https:;
      manifest-src 'self';
      worker-src 'self';
    " />

    <!-- Google Analytics: ID injetado via variável de ambiente no build -->
    <script>
      // O GA só carrega se o ID estiver configurado via VITE_GA_ID
      (function() {
        var gaId = '__VITE_GA_ID__';
        if (!gaId || gaId === '__VITE_GA_ID__') return;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + gaId;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', gaId);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
